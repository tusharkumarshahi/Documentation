name: 'Maven Test'
description: 'Generic Maven test action. Runs tests, publishes JUnit results, and exposes test counts as outputs. Supports JUnit and MUnit.'

inputs:

  java-version:
    description: 'Java version to use.'
    required: false
    default: '17'

  java-distribution:
    description: 'JDK distribution.'
    required: false
    default: 'temurin'

  working-directory:
    description: 'Directory containing pom.xml.'
    required: false
    default: '.'

  test-goals:
    description: 'Maven goals to run for testing.'
    required: false
    default: 'test'

  report-paths:
    description: 'Glob pattern to JUnit XML report files.'
    required: false
    default: '**/target/surefire-reports/TEST-*.xml'

  report-name:
    description: 'Name of the test report shown in GitHub Actions UI.'
    required: false
    default: 'Test Results'

  fail-on-test-failure:
    description: 'Fail the workflow if tests fail. Set to false to always publish results without failing.'
    required: false
    default: 'true'

  build-args:
    description: 'Additional Maven -D flags and arguments e.g. credentials for internal repos.'
    required: false
    default: ''

  settings-xml-path:
    description: 'Path to settings.xml relative to workspace root. Leave empty to use default Maven Central.'
    required: false
    default: ''

outputs:

  total:
    description: 'Total number of tests run.'
    value: ${{ steps.publish-results.outputs.total }}

  passed:
    description: 'Number of tests passed.'
    value: ${{ steps.publish-results.outputs.passed }}

  failed:
    description: 'Number of tests failed.'
    value: ${{ steps.publish-results.outputs.failed }}

  skipped:
    description: 'Number of tests skipped.'
    value: ${{ steps.publish-results.outputs.skipped }}

runs:
  using: 'composite'
  steps:
    - name: Set up Java ${{ inputs.java-version }}
      uses: actions/setup-java@v5
      with:
        distribution: ${{ inputs.java-distribution }}
        java-version: ${{ inputs.java-version }}
        cache: 'maven'
        cache-dependency-path: '${{ inputs.working-directory }}/pom.xml'

    - name: Validate settings.xml
      shell: bash
      run: |
        if [ -n "${{ inputs.settings-xml-path }}" ] && \
           [ ! -f "${{ inputs.settings-xml-path }}" ]; then
          echo "::error::settings.xml not found at '${{ inputs.settings-xml-path }}'."
          exit 1
        fi

    - name: Run tests
      id: run-tests
      shell: bash
      continue-on-error: true
      working-directory: ${{ inputs.working-directory }}
      env:
        SETTINGS_PATH: ${{ inputs.settings-xml-path }}
      run: |
        SETTINGS_ARG=""
        if [ -n "$SETTINGS_PATH" ]; then
          SETTINGS_ARG="-s $GITHUB_WORKSPACE/$SETTINGS_PATH"
        fi

        mvn ${{ inputs.test-goals }} \
          -B \
          $SETTINGS_ARG \
          ${{ inputs.build-args }}

        echo "test-exit-code=$?" >> $GITHUB_OUTPUT

    - name: Publish test results
      id: publish-results
      uses: mikepenz/action-junit-report@v6
      if: always()
      with:
        report_paths: ${{ inputs.report-paths }}
        check_name: ${{ inputs.report-name }}
        fail_on_failure: false
        require_tests: false
        detailed_summary: true
        token: ${{ github.token }}
        
    - name: Enforce test failure
      if: always()
      shell: bash
      run: |
        if [ "${{ inputs.fail-on-test-failure }}" == "true" ] && \
           [ "${{ steps.run-tests.outcome }}" == "failure" ]; then
          echo "::error::Tests failed. See published results above."
          exit 1
        fi